<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Villa Fantasy — Love Island USA</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.14.0/dist/tabler-icons.min.css">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, -apple-system, sans-serif; background: #f5f4f0; color: #1a1a18; min-height: 100vh; }
  :root { --sun:#F5A623;--sun-light:#FEF3DC;--rose:#D4537E;--rose-light:#FBEAF0;--teal:#1D9E75;--teal-light:#E1F5EE;--villain:#993C1D;--villain-light:#FAECE7;--knight:#185FA5;--knight-light:#E6F1FB;--border:#e5e3dc;--border-strong:#ccc;--surface-0:#f5f4f0;--surface-1:#f0efe9;--surface-2:#ffffff;--text-primary:#1a1a18;--text-secondary:#888;--text-muted:#aaa; }
  @media (prefers-color-scheme: dark) {
    body { background: #1a1a18; color: #f0efe9; }
    :root { --border:#333;--border-strong:#555;--surface-0:#1a1a18;--surface-1:#242420;--surface-2:#2e2e2a;--text-primary:#f0efe9;--text-secondary:#aaa;--text-muted:#666; }
  }
  .app { max-width: 760px; margin: 0 auto; padding: 0 0 80px; }
  .header { background: var(--sun); padding: 18px 20px 14px; text-align: center; border-bottom: 2px solid #D4880A; }
  .header h1 { font-size: 22px; font-weight: 700; color: #fff; letter-spacing: -0.3px; }
  .header p { font-size: 13px; color: rgba(255,255,255,0.85); margin-top: 2px; }
  .nav { display: flex; background: var(--surface-2); border-bottom: 0.5px solid var(--border); position: sticky; top: 0; z-index: 10; }
  .nav button { flex: 1; padding: 13px 8px; font-size: 13px; font-weight: 500; color: var(--text-secondary); background: none; border: none; cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.15s; }
  .nav button.active { color: var(--sun); border-bottom-color: var(--sun); }
  .nav button i { display: block; font-size: 18px; margin-bottom: 3px; }
  .page { display: none; padding: 16px; }
  .page.active { display: block; }
  .auth-wrap { display: flex; align-items: center; justify-content: center; min-height: 70vh; }
  .auth-card { background: var(--surface-2); border-radius: 16px; border: 0.5px solid var(--border); padding: 32px 28px; width: 100%; max-width: 340px; text-align: center; }
  .auth-card h2 { font-size: 20px; font-weight: 600; margin-bottom: 6px; }
  .auth-card p { font-size: 14px; color: var(--text-secondary); margin-bottom: 24px; }
  .user-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 20px; }
  .user-btn { padding: 14px 8px; border-radius: 12px; border: 2px solid var(--border); background: var(--surface-1); cursor: pointer; font-size: 15px; font-weight: 600; color: var(--text-primary); transition: all 0.15s; }
  .user-btn.selected { border-color: var(--sun); background: var(--sun-light); color: #7A4800; }
  .pin-row { display: flex; gap: 8px; margin-bottom: 16px; justify-content: center; }
  .pin-dot { width: 14px; height: 14px; border-radius: 50%; border: 2px solid var(--border-strong); background: transparent; transition: background 0.1s; }
  .pin-dot.filled { background: var(--sun); border-color: var(--sun); }
  .keypad { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
  .key { padding: 14px; border-radius: 10px; border: 0.5px solid var(--border); background: var(--surface-1); font-size: 18px; font-weight: 500; cursor: pointer; color: var(--text-primary); transition: all 0.1s; }
  .key:active { transform: scale(0.95); }
  .key.del { font-size: 14px; color: var(--text-secondary); }
  .error-msg { color: #A32D2D; font-size: 13px; margin-top: 10px; min-height: 18px; }
  .badge { display: inline-block; font-size: 11px; font-weight: 600; padding: 3px 8px; border-radius: 6px; }
  .badge-knight { background: var(--knight-light); color: var(--knight); }
  .badge-villain { background: var(--villain-light); color: var(--villain); }
  .badge-aww { background: var(--teal-light); color: #085041; }
  .badge-ick { background: var(--villain-light); color: var(--villain); }
  .pick-section { margin-bottom: 20px; }
  .pick-label { font-size: 13px; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
  .pick-label .dot { width: 8px; height: 8px; border-radius: 50%; }
  .pick-label .dot.knight { background: var(--knight); }
  .pick-label .dot.villain { background: var(--villain); }
  .contestant-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 8px; }
  .c-card { border-radius: 10px; border: 2px solid var(--border); background: var(--surface-1); padding: 10px 10px 8px; cursor: pointer; transition: all 0.15s; text-align: center; }
  .c-card:hover { border-color: var(--border-strong); }
  .c-card.sel-knight { border-color: var(--knight); background: var(--knight-light); }
  .c-card.sel-villain { border-color: var(--villain); background: var(--villain-light); }
  .c-avatar { width: 36px; height: 36px; border-radius: 50%; margin: 0 auto 6px; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; color: #fff; }
  .c-name { font-size: 13px; font-weight: 600; color: var(--text-primary); }
  .c-sub { font-size: 11px; color: var(--text-secondary); margin-top: 2px; }
  .save-btn { width: 100%; padding: 13px; border-radius: 10px; background: var(--sun); color: #fff; font-size: 15px; font-weight: 600; border: none; cursor: pointer; transition: opacity 0.15s; margin-top: 12px; }
  .save-btn:hover { opacity: 0.9; }
  .save-btn:disabled { opacity: 0.45; cursor: not-allowed; }
  .episode-selector { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
  .episode-selector select { flex: 1; padding: 8px 12px; border-radius: 8px; border: 0.5px solid var(--border-strong); background: var(--surface-2); color: var(--text-primary); font-size: 14px; }
  .vote-counter { font-size: 13px; color: var(--text-secondary); }
  .vote-counter span { font-weight: 600; color: var(--text-primary); }
  .vote-c-card { border-radius: 10px; border: 0.5px solid var(--border); background: var(--surface-2); padding: 12px; margin-bottom: 10px; }
  .vote-c-top { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .vote-btns { display: flex; gap: 8px; }
  .vote-btn { flex: 1; padding: 8px; border-radius: 8px; border: 1.5px solid var(--border); background: var(--surface-1); font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.15s; }
  .vote-btn.aww { border-color: var(--teal); color: var(--teal); }
  .vote-btn.aww.active { background: var(--teal); color: #fff; }
  .vote-btn.ick { border-color: var(--rose); color: var(--rose); }
  .vote-btn.ick.active { background: var(--rose); color: #fff; }
  .vote-btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .comment-input { width: 100%; margin-top: 8px; padding: 7px 10px; border-radius: 7px; border: 0.5px solid var(--border); font-size: 13px; background: var(--surface-1); color: var(--text-primary); font-family: inherit; resize: none; }
  .own-pick-note { font-size: 11px; color: var(--text-muted); margin-top: 4px; }
  .feed-item { border-radius: 10px; border: 0.5px solid var(--border); background: var(--surface-2); padding: 12px; margin-bottom: 8px; }
  .feed-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
  .feed-who { font-size: 13px; font-weight: 600; }
  .feed-time { font-size: 11px; color: var(--text-muted); }
  .feed-comment { font-size: 13px; color: var(--text-secondary); margin-top: 4px; font-style: italic; }
  .lb-row { display: flex; align-items: center; gap: 12px; padding: 14px 16px; background: var(--surface-2); border-radius: 12px; border: 0.5px solid var(--border); margin-bottom: 8px; }
  .lb-rank { font-size: 18px; font-weight: 700; width: 28px; text-align: center; }
  .lb-avatar { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; color: #fff; }
  .lb-name { font-size: 15px; font-weight: 600; flex: 1; }
  .lb-score { font-size: 20px; font-weight: 700; color: var(--sun); }
  .lb-picks { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
  .admin-section { margin-bottom: 24px; }
  .admin-section h3 { font-size: 15px; font-weight: 600; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 0.5px solid var(--border); }
  .input-row { display: flex; gap: 8px; margin-bottom: 8px; }
  .input-row input, .input-row select { padding: 8px 12px; border-radius: 8px; border: 0.5px solid var(--border-strong); font-size: 14px; font-family: inherit; background: var(--surface-2); color: var(--text-primary); }
  .input-row input { flex: 1; }
  .admin-btn { padding: 8px 14px; border-radius: 8px; border: none; font-size: 13px; font-weight: 600; cursor: pointer; }
  .admin-btn.add { background: var(--teal); color: #fff; }
  .admin-btn.danger { background: #E24B4A; color: #fff; }
  .admin-btn.warn { background: var(--sun); color: #fff; }
  .contestant-list-item { display: flex; align-items: center; justify-content: space-between; padding: 8px 12px; background: var(--surface-1); border-radius: 8px; margin-bottom: 6px; font-size: 13px; }
  .contestant-list-item.elim { opacity: 0.5; text-decoration: line-through; }
  .ep-list-item { display: flex; align-items: center; justify-content: space-between; padding: 8px 12px; background: var(--surface-1); border-radius: 8px; margin-bottom: 6px; font-size: 13px; }
  .ep-list-item.current { background: var(--sun-light); font-weight: 600; }
  .empty { text-align: center; padding: 32px 16px; color: var(--text-secondary); font-size: 14px; }
  .logout-btn { font-size: 13px; color: var(--text-muted); border: none; background: none; cursor: pointer; padding: 4px 0; }
  .picks-current { font-size: 13px; color: var(--text-secondary); margin-bottom: 16px; }
  .deadline-note { font-size: 12px; color: var(--rose); font-weight: 500; margin-bottom: 4px; }
  .loading { text-align: center; padding: 40px; color: var(--text-secondary); font-size: 14px; }
  .spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--sun); border-radius: 50%; animation: spin 0.7s linear infinite; margin-right: 8px; vertical-align: middle; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .toast { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%); background: #1a1a18; color: #fff; padding: 10px 20px; border-radius: 10px; font-size: 13px; font-weight: 500; z-index: 999; opacity: 0; transition: opacity 0.2s; pointer-events: none; white-space: nowrap; }
  .toast.show { opacity: 1; }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>🌴 Villa Fantasy</h1>
    <p>Love Island USA — Season 8</p>
  </div>
  <div class="nav" id="nav" style="display:none">
    <button class="active" onclick="showPage('picks')" id="nav-picks"><i class="ti ti-shield-heart" aria-hidden="true"></i>Picks</button>
    <button onclick="showPage('vote')" id="nav-vote"><i class="ti ti-thumb-up" aria-hidden="true"></i>Vote</button>
    <button onclick="showPage('feed')" id="nav-feed"><i class="ti ti-messages" aria-hidden="true"></i>Feed</button>
    <button onclick="showPage('leaderboard')" id="nav-lb"><i class="ti ti-trophy" aria-hidden="true"></i>Scores</button>
    <button onclick="showPage('admin')" id="nav-admin" style="display:none"><i class="ti ti-settings" aria-hidden="true"></i>Admin</button>
  </div>
  <div id="page-auth" class="page active" style="padding:0">
    <div class="auth-wrap"><div class="loading"><span class="spinner"></span>Connecting to the villa...</div></div>
  </div>
  <div id="page-picks" class="page">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
      <div><div style="font-size:17px;font-weight:700">Weekly picks</div><div class="deadline-note" id="deadline-note"></div></div>
      <button class="logout-btn" onclick="logout()">Sign out</button>
    </div>
    <div class="picks-current" id="current-picks-display"></div>
    <div class="pick-section">
      <div class="pick-label"><span class="dot knight"></span> Your Knight</div>
      <div class="contestant-grid" id="knight-grid"></div>
    </div>
    <div class="pick-section">
      <div class="pick-label"><span class="dot villain"></span> Your Villain</div>
      <div class="contestant-grid" id="villain-grid"></div>
    </div>
    <button class="save-btn" id="save-picks-btn" onclick="savePicks()">Save picks</button>
  </div>
  <div id="page-vote" class="page">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
      <div style="font-size:17px;font-weight:700">Cast votes</div>
      <button class="logout-btn" onclick="logout()">Sign out</button>
    </div>
    <div class="episode-selector">
      <select id="ep-select" onchange="loadVotePage()"><option value="">Select episode...</option></select>
    </div>
    <div id="vote-counter-wrap" style="margin-bottom:12px"></div>
    <div id="vote-list"></div>
  </div>
  <div id="page-feed" class="page">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
      <div style="font-size:17px;font-weight:700">Vote feed</div>
      <button class="logout-btn" onclick="logout()">Sign out</button>
    </div>
    <div class="episode-selector">
      <select id="feed-ep-select" onchange="loadFeed()"><option value="">All episodes</option></select>
    </div>
    <div id="feed-list"></div>
  </div>
  <div id="page-leaderboard" class="page">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
      <div style="font-size:17px;font-weight:700">Leaderboard</div>
      <button class="logout-btn" onclick="logout()">Sign out</button>
    </div>
    <div id="lb-list"></div>
  </div>
  <div id="page-admin" class="page">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
      <div style="font-size:17px;font-weight:700">Admin panel</div>
      <button class="logout-btn" onclick="logout()">Sign out</button>
    </div>
    <div class="admin-section">
      <h3>Episodes</h3>
      <div class="input-row">
        <input type="text" id="ep-name-input" placeholder="Episode name (e.g. Week 2 Mon)" />
        <button class="admin-btn add" onclick="addEpisode()">Add</button>
      </div>
      <div id="ep-list"></div>
    </div>
    <div class="admin-section">
      <h3>Contestants</h3>
      <div class="input-row">
        <input type="text" id="c-name-input" placeholder="Name" />
        <button class="admin-btn add" onclick="addContestant()">Add</button>
      </div>
      <div id="c-list"></div>
    </div>
    <div class="admin-section">
      <h3>Eliminations</h3>
      <p style="font-size:13px;color:var(--text-secondary);margin-bottom:10px">Mark someone eliminated to trigger score changes.</p>
      <div class="input-row">
        <select id="elim-select" style="flex:1"></select>
        <button class="admin-btn danger" onclick="eliminateContestant()">Eliminate</button>
      </div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="app.js"></script>
</body>
</html>
