
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font-sans, system-ui, sans-serif); background: var(--surface-0, #f5f4f0); color: var(--text-primary, #1a1a18); min-height: 100vh; }

  :root {
    --sun: #F5A623;
    --sun-light: #FEF3DC;
    --rose: #D4537E;
    --rose-light: #FBEAF0;
    --teal: #1D9E75;
    --teal-light: #E1F5EE;
    --villain: #993C1D;
    --villain-light: #FAECE7;
    --knight: #185FA5;
    --knight-light: #E6F1FB;
  }

  .app { max-width: 760px; margin: 0 auto; padding: 0 0 80px; }

  .header {
    background: var(--sun);
    padding: 18px 20px 14px;
    text-align: center;
    border-bottom: 2px solid #D4880A;
  }
  .header h1 { font-size: 22px; font-weight: 700; color: #fff; letter-spacing: -0.3px; }
  .header p { font-size: 13px; color: rgba(255,255,255,0.85); margin-top: 2px; }

  .nav { display: flex; background: var(--surface-2, #fff); border-bottom: 0.5px solid var(--border, #e5e3dc); position: sticky; top: 0; z-index: 10; }
  .nav button { flex: 1; padding: 13px 8px; font-size: 13px; font-weight: 500; color: var(--text-secondary, #888); background: none; border: none; cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.15s; }
  .nav button.active { color: var(--sun); border-bottom-color: var(--sun); }
  .nav button i { display: block; font-size: 18px; margin-bottom: 3px; }

  .page { display: none; padding: 16px; }
  .page.active { display: block; }

  /* Auth */
  .auth-wrap { display: flex; align-items: center; justify-content: center; min-height: 70vh; }
  .auth-card { background: var(--surface-2, #fff); border-radius: 16px; border: 0.5px solid var(--border, #e5e3dc); padding: 32px 28px; width: 100%; max-width: 340px; text-align: center; }
  .auth-card h2 { font-size: 20px; font-weight: 600; margin-bottom: 6px; }
  .auth-card p { font-size: 14px; color: var(--text-secondary, #888); margin-bottom: 24px; }
  .user-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 20px; }
  .user-btn { padding: 14px 8px; border-radius: 12px; border: 2px solid var(--border, #e5e3dc); background: var(--surface-1, #f5f4f0); cursor: pointer; font-size: 15px; font-weight: 600; transition: all 0.15s; }
  .user-btn.selected { border-color: var(--sun); background: var(--sun-light); color: #7A4800; }
  .pin-row { display: flex; gap: 8px; margin-bottom: 16px; justify-content: center; }
  .pin-dot { width: 14px; height: 14px; border-radius: 50%; border: 2px solid var(--border-strong, #ccc); background: transparent; transition: background 0.1s; }
  .pin-dot.filled { background: var(--sun); border-color: var(--sun); }
  .keypad { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
  .key { padding: 14px; border-radius: 10px; border: 0.5px solid var(--border, #e5e3dc); background: var(--surface-1, #f5f4f0); font-size: 18px; font-weight: 500; cursor: pointer; transition: all 0.1s; }
  .key:active { transform: scale(0.95); }
  .key.del { font-size: 14px; color: var(--text-secondary, #888); }
  .error-msg { color: #A32D2D; font-size: 13px; margin-top: 10px; min-height: 18px; }

  /* Cards */
  .card { background: var(--surface-2, #fff); border-radius: 12px; border: 0.5px solid var(--border, #e5e3dc); padding: 16px; margin-bottom: 12px; }
  .card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .card-title { font-size: 15px; font-weight: 600; }
  .badge { display: inline-block; font-size: 11px; font-weight: 600; padding: 3px 8px; border-radius: 6px; }
  .badge-knight { background: var(--knight-light); color: var(--knight); }
  .badge-villain { background: var(--villain-light); color: var(--villain); }
  .badge-aww { background: var(--teal-light); color: #085041; }
  .badge-ick { background: var(--villain-light); color: var(--villain); }

  /* Picks */
  .pick-section { margin-bottom: 20px; }
  .pick-label { font-size: 13px; font-weight: 600; color: var(--text-secondary, #888); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
  .pick-label .dot { width: 8px; height: 8px; border-radius: 50%; }
  .pick-label .dot.knight { background: var(--knight); }
  .pick-label .dot.villain { background: var(--villain); }
  .contestant-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 8px; }
  .c-card { border-radius: 10px; border: 2px solid var(--border, #e5e3dc); background: var(--surface-1, #f5f4f0); padding: 10px 10px 8px; cursor: pointer; transition: all 0.15s; text-align: center; }
  .c-card:hover { border-color: var(--border-strong, #ccc); }
  .c-card.sel-knight { border-color: var(--knight); background: var(--knight-light); }
  .c-card.sel-villain { border-color: var(--villain); background: var(--villain-light); }
  .c-card.eliminated { opacity: 0.45; pointer-events: none; text-decoration: line-through; }
  .c-name { font-size: 13px; font-weight: 600; }
  .c-sub { font-size: 11px; color: var(--text-secondary, #888); margin-top: 2px; }
  .c-avatar { width: 36px; height: 36px; border-radius: 50%; margin: 0 auto 6px; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; color: #fff; }

  .save-btn { width: 100%; padding: 13px; border-radius: 10px; background: var(--sun); color: #fff; font-size: 15px; font-weight: 600; border: none; cursor: pointer; transition: opacity 0.15s; margin-top: 12px; }
  .save-btn:hover { opacity: 0.9; }
  .save-btn:disabled { opacity: 0.45; cursor: not-allowed; }

  /* Votes */
  .episode-selector { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
  .episode-selector select { flex: 1; padding: 8px 12px; border-radius: 8px; border: 0.5px solid var(--border-strong, #ccc); background: var(--surface-2, #fff); font-size: 14px; }
  .vote-counter { font-size: 13px; color: var(--text-secondary, #888); }
  .vote-counter span { font-weight: 600; color: var(--text-primary); }
  .vote-c-card { border-radius: 10px; border: 0.5px solid var(--border, #e5e3dc); background: var(--surface-2, #fff); padding: 12px; margin-bottom: 10px; }
  .vote-c-top { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .vote-btns { display: flex; gap: 8px; }
  .vote-btn { flex: 1; padding: 8px; border-radius: 8px; border: 1.5px solid var(--border, #e5e3dc); background: var(--surface-1, #f5f4f0); font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.15s; }
  .vote-btn.aww { border-color: var(--teal); color: var(--teal); }
  .vote-btn.aww.active { background: var(--teal); color: #fff; }
  .vote-btn.ick { border-color: var(--rose); color: var(--rose); }
  .vote-btn.ick.active { background: var(--rose); color: #fff; }
  .vote-btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .comment-input { width: 100%; margin-top: 8px; padding: 7px 10px; border-radius: 7px; border: 0.5px solid var(--border, #e5e3dc); font-size: 13px; background: var(--surface-1, #f5f4f0); font-family: inherit; resize: none; }
  .own-pick-note { font-size: 11px; color: var(--text-muted, #aaa); margin-top: 4px; }

  /* Feed */
  .feed-item { border-radius: 10px; border: 0.5px solid var(--border, #e5e3dc); background: var(--surface-2, #fff); padding: 12px; margin-bottom: 8px; }
  .feed-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
  .feed-who { font-size: 13px; font-weight: 600; }
  .feed-time { font-size: 11px; color: var(--text-muted, #aaa); }
  .feed-comment { font-size: 13px; color: var(--text-secondary, #888); margin-top: 4px; font-style: italic; }

  /* Leaderboard */
  .lb-row { display: flex; align-items: center; gap: 12px; padding: 14px 16px; background: var(--surface-2, #fff); border-radius: 12px; border: 0.5px solid var(--border, #e5e3dc); margin-bottom: 8px; }
  .lb-rank { font-size: 18px; font-weight: 700; width: 28px; text-align: center; }
  .lb-avatar { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; color: #fff; }
  .lb-name { font-size: 15px; font-weight: 600; flex: 1; }
  .lb-score { font-size: 20px; font-weight: 700; color: var(--sun); }
  .lb-picks { font-size: 12px; color: var(--text-secondary, #888); margin-top: 2px; }

  /* Admin */
  .admin-section { margin-bottom: 24px; }
  .admin-section h3 { font-size: 15px; font-weight: 600; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 0.5px solid var(--border, #e5e3dc); }
  .input-row { display: flex; gap: 8px; margin-bottom: 8px; }
  .input-row input { flex: 1; padding: 8px 12px; border-radius: 8px; border: 0.5px solid var(--border-strong, #ccc); font-size: 14px; font-family: inherit; }
  .input-row select { padding: 8px 12px; border-radius: 8px; border: 0.5px solid var(--border-strong, #ccc); font-size: 14px; }
  .admin-btn { padding: 8px 14px; border-radius: 8px; border: none; font-size: 13px; font-weight: 600; cursor: pointer; }
  .admin-btn.add { background: var(--teal); color: #fff; }
  .admin-btn.danger { background: #E24B4A; color: #fff; }
  .admin-btn.warn { background: var(--sun); color: #fff; }
  .contestant-list-item { display: flex; align-items: center; justify-content: space-between; padding: 8px 12px; background: var(--surface-1, #f5f4f0); border-radius: 8px; margin-bottom: 6px; font-size: 13px; }
  .contestant-list-item.elim { opacity: 0.5; text-decoration: line-through; }
  .item-actions { display: flex; gap: 6px; }
  .ep-list-item { display: flex; align-items: center; justify-content: space-between; padding: 8px 12px; background: var(--surface-1, #f5f4f0); border-radius: 8px; margin-bottom: 6px; font-size: 13px; }
  .ep-list-item.current { background: var(--sun-light); font-weight: 600; }

  .section-note { font-size: 12px; color: var(--text-muted, #aaa); margin-top: 6px; }

  .empty { text-align: center; padding: 32px 16px; color: var(--text-secondary, #888); font-size: 14px; }

  .logout-btn { font-size: 13px; color: var(--text-muted, #aaa); border: none; background: none; cursor: pointer; padding: 4px 0; }

  .picks-current { font-size: 13px; color: var(--text-secondary, #888); margin-bottom: 16px; }
  .deadline-note { font-size: 12px; color: var(--rose); font-weight: 500; margin-bottom: 12px; }

  .score-breakdown { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 6px; }
  .score-pill { font-size: 11px; padding: 2px 7px; border-radius: 5px; background: var(--surface-1, #f5f4f0); color: var(--text-secondary, #888); border: 0.5px solid var(--border, #e5e3dc); }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>🌴 Villa Fantasy</h1>
    <p>Love Island USA — Season 8</p>
  </div>

  <div class="nav" id="nav" style="display:none">
    <button class="active" onclick="showPage('picks')" id="nav-picks"><i class="ti ti-shield-heart" aria-hidden="true"></i>Picks</button>
    <button onclick="showPage('vote')" id="nav-vote"><i class="ti ti-thumb-up" aria-hidden="true"></i>Vote</button>
    <button onclick="showPage('feed')" id="nav-feed"><i class="ti ti-messages" aria-hidden="true"></i>Feed</button>
    <button onclick="showPage('leaderboard')" id="nav-lb"><i class="ti ti-trophy" aria-hidden="true"></i>Scores</button>
    <button onclick="showPage('admin')" id="nav-admin" style="display:none"><i class="ti ti-settings" aria-hidden="true"></i>Admin</button>
  </div>

  <!-- AUTH -->
  <div id="page-auth" class="page active" style="padding:0">
    <div class="auth-wrap">
      <div class="auth-card">
        <h2>Welcome to the Villa</h2>
        <p>Who are you?</p>
        <div class="user-grid" id="user-grid"></div>
        <div class="pin-row" id="pin-dots"></div>
        <div class="keypad" id="keypad"></div>
        <div class="error-msg" id="auth-error"></div>
      </div>
    </div>
  </div>

  <!-- PICKS -->
  <div id="page-picks" class="page">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
      <div>
        <div style="font-size:17px;font-weight:700">Weekly Picks</div>
        <div class="deadline-note" id="deadline-note"></div>
      </div>
      <button class="logout-btn" onclick="logout()">Sign out</button>
    </div>
    <div class="picks-current" id="current-picks-display"></div>
    <div class="pick-section">
      <div class="pick-label"><span class="dot knight"></span> Your Knight</div>
      <div class="contestant-grid" id="knight-grid"></div>
    </div>
    <div class="pick-section">
      <div class="pick-label"><span class="dot villain"></span> Your Villain</div>
      <div class="contestant-grid" id="villain-grid"></div>
    </div>
    <button class="save-btn" id="save-picks-btn" onclick="savePicks()">Save picks</button>
  </div>

  <!-- VOTE -->
  <div id="page-vote" class="page">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
      <div style="font-size:17px;font-weight:700">Cast votes</div>
      <button class="logout-btn" onclick="logout()">Sign out</button>
    </div>
    <div class="episode-selector">
      <select id="ep-select" onchange="loadVotePage()">
        <option value="">Select episode...</option>
      </select>
    </div>
    <div id="vote-counter-wrap" style="margin-bottom:12px"></div>
    <div id="vote-list"></div>
  </div>

  <!-- FEED -->
  <div id="page-feed" class="page">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
      <div style="font-size:17px;font-weight:700">Vote feed</div>
      <button class="logout-btn" onclick="logout()">Sign out</button>
    </div>
    <div class="episode-selector">
      <select id="feed-ep-select" onchange="loadFeed()">
        <option value="">All episodes</option>
      </select>
    </div>
    <div id="feed-list"></div>
  </div>

  <!-- LEADERBOARD -->
  <div id="page-leaderboard" class="page">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
      <div style="font-size:17px;font-weight:700">Leaderboard</div>
      <button class="logout-btn" onclick="logout()">Sign out</button>
    </div>
    <div id="lb-list"></div>
  </div>

  <!-- ADMIN -->
  <div id="page-admin" class="page">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
      <div style="font-size:17px;font-weight:700">Admin panel</div>
      <button class="logout-btn" onclick="logout()">Sign out</button>
    </div>

    <div class="admin-section">
      <h3>Episodes</h3>
      <div class="input-row">
        <input type="text" id="ep-name-input" placeholder="Episode name (e.g. Week 2 Mon)" />
        <button class="admin-btn add" onclick="addEpisode()">Add</button>
      </div>
      <div id="ep-list"></div>
    </div>

    <div class="admin-section">
      <h3>Contestants</h3>
      <div class="input-row">
        <input type="text" id="c-name-input" placeholder="Name" />
        <input type="text" id="c-partner-input" placeholder="Partner (optional)" style="max-width:130px" />
        <button class="admin-btn add" onclick="addContestant()">Add</button>
      </div>
      <div id="c-list"></div>
    </div>

    <div class="admin-section">
      <h3>Eliminations</h3>
      <p style="font-size:13px;color:var(--text-secondary);margin-bottom:10px">Mark someone as eliminated to trigger point changes.</p>
      <div class="input-row">
        <select id="elim-select" style="flex:1;padding:8px 12px;border-radius:8px;border:0.5px solid var(--border-strong);font-size:14px"></select>
        <button class="admin-btn danger" onclick="eliminateContestant()">Eliminate</button>
      </div>
    </div>
  </div>
</div>

<script>
const USERS = {
  OH: { pin: '1717', color: '#D4537E' },
  CS: { pin: '1234', color: '#1D9E75' },
  RR: { pin: '4321', color: '#185FA5' },
  ADMIN: { pin: '3232', color: '#F5A623', isAdmin: true }
};

const INIT_CONTESTANTS = [
  {name:'Jen', partner:'Gal'},{name:'Gal', partner:'Jen'},
  {name:'Caleb', partner:'Jaiden'},{name:'Jaiden', partner:'Caleb'},
  {name:'Kenzie', partner:'Dylan'},{name:'Dylan', partner:'Kenzie'},
  {name:'Corbin', partner:'Parmida'},{name:'Parmida', partner:'Corbin'},
  {name:'Kayda', partner:'Zach'},{name:'Zach', partner:'Kayda'},
  {name:'Melanie', partner:'Sincere'},{name:'Sincere', partner:'Melanie'},
  {name:'Trinity', partner:'Bryce'},{name:'Bryce', partner:'Trinity'},
  {name:'KC', partner:'Tierra'},{name:'Tierra', partner:'KC'},
  {name:'Aniya', partner:''}
];

let state = {
  currentUser: null,
  pinEntry: '',
  selectedUser: null,
  selectedKnight: null,
  selectedVillain: null,
};

let db = {
  contestants: [],
  episodes: [],
  picks: {},
  votes: {},
  scores: {}
};

function avatarColor(name) {
  const colors = ['#D4537E','#1D9E75','#185FA5','#F5A623','#993C1D','#534AB7','#0F6E56'];
  let h = 0; for (let c of name) h = (h * 31 + c.charCodeAt(0)) % colors.length;
  return colors[h];
}
function initials(name) { return name.slice(0,2).toUpperCase(); }

async function loadDB() {
  try {
    const r = await window.storage.get('villadb');
    if (r && r.value) {
      db = JSON.parse(r.value);
    } else {
      db.contestants = INIT_CONTESTANTS.map((c,i) => ({...c, id: 'c'+i, eliminated: false}));
      db.episodes = [];
      db.picks = {};
      db.votes = {};
      db.scores = { OH: 0, CS: 0, RR: 0 };
      await saveDB();
    }
  } catch(e) {
    db.contestants = INIT_CONTESTANTS.map((c,i) => ({...c, id: 'c'+i, eliminated: false}));
    db.episodes = [];
    db.picks = {};
    db.votes = {};
    db.scores = { OH: 0, CS: 0, RR: 0 };
  }
}

async function saveDB() {
  try { await window.storage.set('villadb', JSON.stringify(db)); } catch(e) {}
}

function renderAuth() {
  const grid = document.getElementById('user-grid');
  grid.innerHTML = ['OH','CS','RR','ADMIN'].map(u => 
    `<button class="user-btn${state.selectedUser===u?' selected':''}" onclick="selectUser('${u}')">${u}</button>`
  ).join('');
  const dots = document.getElementById('pin-dots');
  dots.innerHTML = [0,1,2,3].map(i =>
    `<div class="pin-dot${state.pinEntry.length>i?' filled':''}"></div>`
  ).join('');
  const kp = document.getElementById('keypad');
  kp.innerHTML = ['1','2','3','4','5','6','7','8','9','','0','⌫'].map(k =>
    k ? `<button class="key${k==='⌫'?' del':''}" onclick="keyPress('${k}')">${k}</button>` : '<div></div>'
  ).join('');
}

function selectUser(u) {
  state.selectedUser = u;
  state.pinEntry = '';
  document.getElementById('auth-error').textContent = '';
  renderAuth();
}

function keyPress(k) {
  if (!state.selectedUser) { document.getElementById('auth-error').textContent = 'Select a name first.'; return; }
  if (k === '⌫') { state.pinEntry = state.pinEntry.slice(0,-1); }
  else if (state.pinEntry.length < 4) { state.pinEntry += k; }
  if (state.pinEntry.length === 4) {
    const u = state.selectedUser;
    if (USERS[u].pin === state.pinEntry) { login(u); }
    else { document.getElementById('auth-error').textContent = 'Wrong PIN. Try again.'; state.pinEntry = ''; }
  }
  renderAuth();
}

function login(u) {
  state.currentUser = u;
  document.getElementById('page-auth').classList.remove('active');
  document.getElementById('nav').style.display = 'flex';
  if (USERS[u].isAdmin) document.getElementById('nav-admin').style.display = '';
  showPage('picks');
}

function logout() {
  state.currentUser = null; state.selectedUser = null; state.pinEntry = '';
  document.getElementById('nav').style.display = 'none';
  document.getElementById('nav-admin').style.display = 'none';
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-auth').classList.add('active');
  renderAuth();
}

function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
  document.getElementById('nav-'+(id==='leaderboard'?'lb':id==='admin'?'admin':id)).classList.add('active');
  if (id==='picks') renderPicks();
  if (id==='vote') renderVotePage();
  if (id==='feed') renderFeed();
  if (id==='leaderboard') renderLeaderboard();
  if (id==='admin') renderAdmin();
}

// --- PICKS ---
function getCurrentWeekKey() {
  const now = new Date();
  const day = now.getDay();
  const diff = now.getDate() - day + (day === 0 ? -6 : 1);
  const mon = new Date(now.setDate(diff));
  return `w${mon.getFullYear()}${String(mon.getMonth()+1).padStart(2,'0')}${String(mon.getDate()).padStart(2,'0')}`;
}

function isPicksLocked() {
  const now = new Date();
  const et = new Date(now.toLocaleString('en-US', {timeZone:'America/New_York'}));
  return et.getDay() === 1 && et.getHours() >= 21;
}

function renderPicks() {
  const u = state.currentUser;
  const wk = getCurrentWeekKey();
  const myPicks = (db.picks[u] || {})[wk] || {};
  state.selectedKnight = myPicks.knight || null;
  state.selectedVillain = myPicks.villain || null;

  const locked = isPicksLocked();
  document.getElementById('deadline-note').textContent = locked ? '🔒 Picks locked — episode in progress' : 'Lock-in by Monday 9:00 PM ET';

  const cur = document.getElementById('current-picks-display');
  if (myPicks.knight || myPicks.villain) {
    const kc = db.contestants.find(c=>c.id===myPicks.knight);
    const vc = db.contestants.find(c=>c.id===myPicks.villain);
    cur.innerHTML = `<span class="badge badge-knight">Knight: ${kc?kc.name:'—'}</span>  <span class="badge badge-villain">Villain: ${vc?vc.name:'—'}</span>`;
  } else { cur.innerHTML = '<span style="color:var(--text-muted)">No picks yet this week</span>'; }

  const active = db.contestants.filter(c => !c.eliminated);
  renderPickGrid('knight-grid', active, 'knight', locked);
  renderPickGrid('villain-grid', active, 'villain', locked);
  document.getElementById('save-picks-btn').disabled = locked;
}

function renderPickGrid(elId, contestants, role, locked) {
  const grid = document.getElementById(elId);
  const other = role === 'knight' ? 'villain' : 'knight';
  grid.innerHTML = contestants.map(c => {
    const isOther = c.id === state['selected'+other.charAt(0).toUpperCase()+other.slice(1)];
    const isSel = c.id === state['selected'+role.charAt(0).toUpperCase()+role.slice(1)];
    const disabled = isOther || locked;
    return `<div class="c-card${isSel?' sel-'+role:''}" onclick="${disabled?'':'selectPick(\''+role+'\',\''+c.id+'\')'}" style="${disabled?'opacity:0.4;cursor:not-allowed':''}">
      <div class="c-avatar" style="background:${avatarColor(c.name)}">${initials(c.name)}</div>
      <div class="c-name">${c.name}</div>
      ${c.partner?`<div class="c-sub">+ ${c.partner}</div>`:'<div class="c-sub">Single</div>'}
    </div>`;
  }).join('');
}

function selectPick(role, cid) {
  state['selected'+(role==='knight'?'Knight':'Villain')] = cid;
  renderPicks();
}

async function savePicks() {
  const u = state.currentUser;
  const wk = getCurrentWeekKey();
  if (!state.selectedKnight || !state.selectedVillain) { alert('Select both a Knight and a Villain first.'); return; }
  if (!db.picks[u]) db.picks[u] = {};
  db.picks[u][wk] = { knight: state.selectedKnight, villain: state.selectedVillain, savedAt: Date.now() };
  await saveDB();
  renderPicks();
  alert('Picks saved!');
}

// --- VOTES ---
function getUserVotesForEp(user, epId) {
  return (db.votes[epId] || []).filter(v => v.user === user);
}

function renderVotePage() {
  const epSel = document.getElementById('ep-select');
  epSel.innerHTML = '<option value="">Select episode...</option>' + db.episodes.map(e =>
    `<option value="${e.id}"${e.current?' (current)':''}>${e.name}</option>`
  ).join('');
  loadVotePage();
}

function loadVotePage() {
  const epId = document.getElementById('ep-select').value;
  const u = state.currentUser;
  const wk = getCurrentWeekKey();
  const myPicks = ((db.picks[u] || {})[wk]) || {};
  const myVotes = getUserVotesForEp(u, epId);
  const voteCount = myVotes.length;
  const hasIck = myVotes.some(v => v.type === 'ick');
  const hasAww = myVotes.some(v => v.type === 'aww');

  const ctr = document.getElementById('vote-counter-wrap');
  if (!epId) { ctr.innerHTML = ''; document.getElementById('vote-list').innerHTML = '<div class="empty">Select an episode above.</div>'; return; }
  ctr.innerHTML = `<div class="vote-counter">Votes used: <span>${voteCount}/5</span> — needs at least 1 Ick & 1 Aww</div>`;

  const active = db.contestants.filter(c => !c.eliminated);
  const list = document.getElementById('vote-list');
  list.innerHTML = active.map(c => {
    const isMyPick = c.id === myPicks.knight || c.id === myPicks.villain;
    const myVote = myVotes.find(v => v.cid === c.id);
    const totalAww = (db.votes[epId]||[]).filter(v=>v.cid===c.id&&v.type==='aww').length;
    const totalIck = (db.votes[epId]||[]).filter(v=>v.cid===c.id&&v.type==='ick').length;

    const canVote = !isMyPick && voteCount < 5;
    const awwDisabled = isMyPick || (voteCount >= 5 && myVote?.type !== 'aww') || (!hasIck && !hasAww && voteCount === 4);
    const ickDisabled = isMyPick || (voteCount >= 5 && myVote?.type !== 'ick') || (!hasAww && !hasIck && voteCount === 4);

    return `<div class="vote-c-card">
      <div class="vote-c-top">
        <div class="c-avatar" style="background:${avatarColor(c.name)};width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff">${initials(c.name)}</div>
        <div style="flex:1">
          <div style="font-size:14px;font-weight:600">${c.name} ${c.partner?`<span style="font-size:12px;color:var(--text-secondary)">+ ${c.partner}</span>`:'<span style="font-size:12px;color:var(--text-secondary)">Single</span>'}</div>
          <div style="font-size:12px;color:var(--text-secondary)">Aww: ${totalAww} · Ick: ${totalIck}</div>
        </div>
        ${myVote ? `<span class="badge ${myVote.type==='aww'?'badge-aww':'badge-ick'}">${myVote.type==='aww'?'Aww':'Ick'}</span>` : ''}
      </div>
      ${isMyPick ? `<div class="own-pick-note">Your pick — can't vote on your own contestants</div>` : `
      <div class="vote-btns">
        <button class="vote-btn aww${myVote?.type==='aww'?' active':''}" ${awwDisabled&&myVote?.type!=='aww'?'disabled':''} onclick="castVote('${epId}','${c.id}','aww')">Aww</button>
        <button class="vote-btn ick${myVote?.type==='ick'?' active':''}" ${ickDisabled&&myVote?.type!=='ick'?'disabled':''} onclick="castVote('${epId}','${c.id}','ick')">Ick</button>
      </div>
      <textarea class="comment-input" placeholder="Add a comment (optional)..." rows="2" id="comment-${c.id}" onchange="saveComment('${epId}','${c.id}',this.value)">${myVote?.comment||''}</textarea>
      `}
    </div>`;
  }).join('');
}

async function castVote(epId, cid, type) {
  const u = state.currentUser;
  if (!db.votes[epId]) db.votes[epId] = [];
  const existing = db.votes[epId].findIndex(v => v.user === u && v.cid === cid);
  const myVotes = getUserVotesForEp(u, epId);

  if (existing >= 0) {
    if (db.votes[epId][existing].type === type) {
      db.votes[epId].splice(existing, 1);
    } else {
      db.votes[epId][existing].type = type;
      db.votes[epId][existing].ts = Date.now();
    }
  } else {
    if (myVotes.length >= 5) return;
    const hasIck = myVotes.some(v=>v.type==='ick'), hasAww = myVotes.some(v=>v.type==='aww');
    if (myVotes.length === 4 && !hasIck && type !== 'ick') { alert('You need at least 1 Ick vote. Save your last vote for an Ick!'); return; }
    if (myVotes.length === 4 && !hasAww && type !== 'aww') { alert('You need at least 1 Aww vote. Save your last vote for an Aww!'); return; }
    db.votes[epId].push({ user: u, cid, type, ts: Date.now(), comment: '' });
  }
  recalcScores();
  await saveDB();
  loadVotePage();
}

async function saveComment(epId, cid, val) {
  const u = state.currentUser;
  const v = (db.votes[epId]||[]).find(x => x.user===u && x.cid===cid);
  if (v) { v.comment = val; await saveDB(); }
}

// --- SCORES ---
function recalcScores() {
  const scores = { OH: 0, CS: 0, RR: 0 };
  const allWeeks = new Set();
  Object.values(db.picks).forEach(wp => Object.keys(wp).forEach(w => allWeeks.add(w)));

  for (const week of allWeeks) {
    const picksThisWeek = {};
    for (const u of ['OH','CS','RR']) {
      picksThisWeek[u] = ((db.picks[u]||{})[week]) || {};
    }
    for (const ep of db.episodes) {
      const votes = db.votes[ep.id] || [];
      for (const vote of votes) {
        for (const u of ['OH','CS','RR']) {
          const pk = picksThisWeek[u];
          if (vote.cid === pk.knight && vote.type === 'aww') scores[u]++;
          if (vote.cid === pk.villain && vote.type === 'ick') scores[u]++;
        }
      }
    }
    for (const c of db.contestants) {
      if (c.eliminated && c.elimWeek === week) {
        for (const u of ['OH','CS','RR']) {
          const pk = picksThisWeek[u];
          if (c.id === pk.knight) scores[u] -= 5;
          if (c.id === pk.villain) scores[u] += 5;
        }
      }
    }
  }
  db.scores = scores;
}

// --- FEED ---
function renderFeed() {
  const fepSel = document.getElementById('feed-ep-select');
  fepSel.innerHTML = '<option value="">All episodes</option>' + db.episodes.map(e =>
    `<option value="${e.id}">${e.name}</option>`
  ).join('');
  loadFeed();
}

function loadFeed() {
  const epId = document.getElementById('feed-ep-select').value;
  let allVotes = [];
  const eps = epId ? db.episodes.filter(e=>e.id===epId) : db.episodes;
  for (const ep of eps) {
    (db.votes[ep.id]||[]).forEach(v => allVotes.push({...v, epName: ep.name}));
  }
  allVotes.sort((a,b)=>b.ts-a.ts);
  const list = document.getElementById('feed-list');
  if (!allVotes.length) { list.innerHTML = '<div class="empty">No votes yet.</div>'; return; }
  list.innerHTML = allVotes.map(v => {
    const c = db.contestants.find(x=>x.id===v.cid);
    return `<div class="feed-item">
      <div class="feed-top">
        <span class="feed-who">${v.user} → <span class="badge ${v.type==='aww'?'badge-aww':'badge-ick'}">${v.type==='aww'?'Aww':'Ick'}</span> ${c?c.name:'?'}</span>
        <span class="feed-time">${v.epName} · ${new Date(v.ts).toLocaleDateString()}</span>
      </div>
      ${v.comment ? `<div class="feed-comment">"${v.comment}"</div>` : ''}
    </div>`;
  }).join('');
}

// --- LEADERBOARD ---
function renderLeaderboard() {
  recalcScores();
  const users = ['OH','CS','RR'].sort((a,b)=>db.scores[b]-db.scores[a]);
  const medals = ['🥇','🥈','🥉'];
  const wk = getCurrentWeekKey();
  const list = document.getElementById('lb-list');
  list.innerHTML = users.map((u,i) => {
    const pk = ((db.picks[u]||{})[wk]) || {};
    const kc = db.contestants.find(c=>c.id===pk.knight);
    const vc = db.contestants.find(c=>c.id===pk.villain);
    return `<div class="lb-row">
      <div class="lb-rank">${medals[i]}</div>
      <div class="lb-avatar" style="background:${USERS[u].color}">${u}</div>
      <div style="flex:1">
        <div class="lb-name">${u}</div>
        <div class="lb-picks">${kc?`Knight: ${kc.name}`:'No knight'} · ${vc?`Villain: ${vc.name}`:'No villain'}</div>
      </div>
      <div class="lb-score">${db.scores[u] ?? 0}</div>
    </div>`;
  }).join('');
}

// --- ADMIN ---
function renderAdmin() {
  const epList = document.getElementById('ep-list');
  epList.innerHTML = db.episodes.length ? db.episodes.map(e =>
    `<div class="ep-list-item${e.current?' current':''}">
      <span>${e.name}</span>
      <div class="item-actions">
        <button class="admin-btn ${e.current?'warn':'add'}" onclick="toggleCurrentEp('${e.id}')">${e.current?'Current':'Set current'}</button>
        <button class="admin-btn danger" onclick="deleteEp('${e.id}')">Delete</button>
      </div>
    </div>`
  ).join('') : '<div class="empty" style="padding:12px">No episodes yet.</div>';

  const cList = document.getElementById('c-list');
  cList.innerHTML = db.contestants.map(c =>
    `<div class="contestant-list-item${c.eliminated?' elim':''}">
      <span>${c.name}${c.partner?' + '+c.partner:' (single)'}${c.eliminated?' ✗':''}</span>
      <div class="item-actions">
        <button class="admin-btn danger" onclick="deleteContestant('${c.id}')">Remove</button>
      </div>
    </div>`
  ).join('');

  const elimSel = document.getElementById('elim-select');
  elimSel.innerHTML = db.contestants.filter(c=>!c.eliminated).map(c =>
    `<option value="${c.id}">${c.name}</option>`
  ).join('');
}

async function addEpisode() {
  const nm = document.getElementById('ep-name-input').value.trim();
  if (!nm) return;
  db.episodes.push({ id: 'ep'+Date.now(), name: nm, current: false });
  document.getElementById('ep-name-input').value = '';
  await saveDB();
  renderAdmin();
}

async function deleteEp(id) {
  if (!confirm('Delete this episode?')) return;
  db.episodes = db.episodes.filter(e=>e.id!==id);
  delete db.votes[id];
  await saveDB();
  renderAdmin();
}

async function toggleCurrentEp(id) {
  db.episodes.forEach(e => e.current = e.id === id ? !e.current : false);
  await saveDB();
  renderAdmin();
}

async function addContestant() {
  const nm = document.getElementById('c-name-input').value.trim();
  const pt = document.getElementById('c-partner-input').value.trim();
  if (!nm) return;
  db.contestants.push({ id: 'c'+Date.now(), name: nm, partner: pt, eliminated: false });
  document.getElementById('c-name-input').value = '';
  document.getElementById('c-partner-input').value = '';
  await saveDB();
  renderAdmin();
}

async function deleteContestant(id) {
  if (!confirm('Remove this contestant?')) return;
  db.contestants = db.contestants.filter(c=>c.id!==id);
  await saveDB();
  renderAdmin();
}

async function eliminateContestant() {
  const id = document.getElementById('elim-select').value;
  const c = db.contestants.find(x=>x.id===id);
  if (!c || !confirm(`Eliminate ${c.name}? This will trigger score changes.`)) return;
  c.eliminated = true;
  c.elimWeek = getCurrentWeekKey();
  recalcScores();
  await saveDB();
  renderAdmin();
}

async function init() {
  await loadDB();
  renderAuth();
}

init();
</script>
